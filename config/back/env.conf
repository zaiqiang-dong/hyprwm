env = GDK_BACKEND,wayland,x11,*
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland


env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland


env = XMODIFIERS,@im=fcitx
env = QT_IM_MODULE,fcitx

env = XCURSOR_THEME,Adwaita
env = XCURSOR_SIZE,24

# exec = echo "Xft.dpi:192" | xrdb -merge
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_FONT_DPI,144
# Avoid fractional whole-window scaling for Qt; it can make text look blurry.
# Use QT_FONT_DPI / qt5ct font size for readable, sharp text instead.
# env = QT_SCALE_FACTOR,1.25
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_QPA_PLATFORMTHEME,qt5ct

# env = GDK_DPI_SCALE,2
env = GDK_SCALE,2

exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP QT_FONT_DPI GDK_SCALE QT_QPA_PLATFORM QT_AUTO_SCREEN_SCALE_FACTOR
exec-once = systemctl --user import-environment QT_IM_MODULE XMODIFIERS
exec-once = dbus-update-activation-environment --systemd --all
