windowrule {
  name = windowrule-1
  workspace = 11 silent
  match:class = ^(clash-verge)$
}

windowrule {
  name = windowrule-2
  workspace = 10 silent
  match:class = ^([Gg]oogle-chrome(-beta|-dev|-unstable)?)$
}

windowrule {
  name = windowrule-3
  workspace = 9 silent
  match:class = ^(Bytedance-feishu)$
}


windowrule {
  name = windowrule-4
  float = on
  size = 800 600
  center = on
  match:class = ^([x|X]dg-desktop-portal-gtk)$
}


windowrule {
  name = windowrule-5
  float = on
  size = 800 600
  center = on
  match:class = ^(xdg-desktop-portal-phosh)$
}


windowrule {
  name = windowrule-6
  maximize = on
  match:class = ^(neovide)$
}

# windowrulev2 = maximize, class:^(org.remmina.Remmina)$

windowrule {
  name = windowrule-7
  float = on
  center = on
  match:title = ^(wpsoffice)$
}

# windowrulev2 = size 1500 800, title:^(wpsoffice)$

windowrule {
  name = windowrule-8-0
  float = on
  center = on
  workspace = 12
  no_initial_focus = on
  match:class = ^(飞书会议)$
  # match:initial_class = ^(飞书会议)$
}

windowrule {
  name = windowrule-8-1
  float = on
  workspace = 12
  center = on
  no_initial_focus = on
  match:class = ^(Meeting)$
  # match:initial_class = ^(Meeting)$
}

windowrule {
  name = windowrule-9
  float = on
  match:class = ^(org.freedesktop.impl.portal.desktop.kde)$
}


windowrule {
  name = windowrule-10
  float = on
  maximize = on
  # size = (monitor_w*1) (monitor_h*0.8)
  center = on
  match:class = ^(scrcpy)$
}


windowrule {
  name = windowrule-11
  maximize = on
  match:class = ^(QualcommPackageManager3)$
}

windowrule {
  name = windowrule-12
  maximize = on
  match:class = ^(PCATApp)$
}

windowrule {
  name = windowrule-13
  float = on
  center = on
  size = (monitor_w*0.8) (monitor_h*0.8)
  match:class = ^(showtime)$
}

windowrule {
  name = windowrule-14
  float = on
  center = on
  match:title = ^(图片)$
  match:initial_title = ^(图片)$
}

windowrule {
  name = windowrule-15
  float = on
  center = on
  size = (monitor_w*0.6) (monitor_h*0.6)
  match:title = ^(satty)$
}

